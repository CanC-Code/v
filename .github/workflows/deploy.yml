name: Deploy MotionForge to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Models
        run: |
          mkdir -p models
          
          # 1. Download the public ONNX asset bundle
          wget -qO fomm.zip "https://qaihub-public-assets.s3.us-west-2.amazonaws.com/qai-hub-models/models/fomm/releases/v0.49.1/fomm-onnx-float.zip"
          
          # 2. Extract into a temporary directory
          unzip -q fomm.zip -d temp_models
          
          # 3. Copy files using original names to avoid breaking internal links
          # The ONNX files are hardcoded to look for their .data sidecars by name.
          find temp_models -type f \( -name "*FOMMDetector.onnx" -o -name "*FOMMDetector.data" \) -exec cp {} models/ \;
          find temp_models -type f \( -name "*FOMMGenerator.onnx" -o -name "*FOMMGenerator.data" \) -exec cp {} models/ \;
          
          # 4. Clean up
          rm -rf fomm.zip temp_models
          ls -lh models/

      - name: Create .nojekyll file
        run: |
          # Disable Jekyll so it doesn't process or rename our model files
          touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
