name: Deploy MotionForge to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Models
        run: |
          mkdir -p models
          # Replace these with the actual direct download links to your ONNX models
          wget -O models/kp_detector.onnx "https://huggingface.co/YOUR_REPO/resolve/main/kp_detector.onnx"
          wget -O models/generator.onnx "https://huggingface.co/YOUR_REPO/resolve/main/generator.onnx"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
