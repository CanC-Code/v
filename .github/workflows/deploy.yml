name: Deploy MotionForge to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Models
        run: |
          mkdir -p models
          # Downloading valid, free, and public ONNX motion models
          wget -O models/kp_detector.onnx "https://huggingface.co/qualcomm/First-Order-Motion-Model/resolve/main/FOMMDetector.onnx"
          wget -O models/generator.onnx "https://huggingface.co/myn0908/Live-Portrait-ONNX/resolve/main/generator.onnx"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
