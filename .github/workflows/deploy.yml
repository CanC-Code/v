name: Deploy MotionForge to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Models
        run: |
          mkdir -p models
          
          # 1. Download the public ONNX asset bundle
          wget -qO fomm.zip "https://qaihub-public-assets.s3.us-west-2.amazonaws.com/qai-hub-models/models/fomm/releases/v0.49.1/fomm-onnx-float.zip"
          
          # 2. Extract into a temporary directory
          unzip -q fomm.zip -d temp_models
          
          # 3. Use 'find' to locate the specific .onnx and .data files 
          # This handles cases where files are inside nested subdirectories
          find temp_models -type f -name "*FOMMDetector.onnx" -exec cp {} models/kp_detector.onnx \;
          find temp_models -type f -name "*FOMMDetector.data" -exec cp {} models/kp_detector.data \;
          find temp_models -type f -name "*FOMMGenerator.onnx" -exec cp {} models/generator.onnx \;
          find temp_models -type f -name "*FOMMGenerator.data" -exec cp {} models/generator.data \;
          
          # 4. Clean up temporary files
          rm -rf fomm.zip temp_models
          
          # 5. Verify the files are present
          ls -lh models/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: deploy-pages@v4
